{{define "base"}}<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "title" .}}Gestionale OpenCity{{end}}</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/htmx.min.js"></script>
</head>
<body>
{{if .Op}}
<nav class="navbar">
  <span class="navbar-brand">Gestionale OpenCity — Montesilvano</span>
  <div class="navbar-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/bandi">Bandi</a>
    <a href="/audit">Audit</a>
    {{if .Op.IsAdmin}}<a href="/setup">Setup</a>{{end}}
    <span class="navbar-user">{{.Op.Username}} ({{.Op.Ruolo}})</span>
    <a href="/logout">Esci</a>
  </div>
</nav>
{{end}}
<main class="container">
{{if .Flash}}<div class="alert alert-{{.FlashType}}">{{.Flash}}</div>{{end}}
{{block "content" .}}{{end}}
</main>
</body>
</html>{{end}}
