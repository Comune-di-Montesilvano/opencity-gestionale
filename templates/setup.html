{{define "setup.html"}}
{{template "base" .}}
{{end}}

{{define "title"}}Setup wizard{{end}}

{{define "content"}}
<h1>Setup wizard</h1>
{{if .Virgine}}<div class="alert alert-info">Database vuoto. Configura almeno un bando per iniziare.</div>{{end}}

<div class="wizard">
  <div class="wizard-step">
    <h2>Step 1 — Verifica connessione OpenCity</h2>
    <p>URL: <code>{{.BaseURL}}</code></p>
    <button class="btn btn-primary"
      hx-post="/setup/step/1"
      hx-target="#step1-result"
      hx-indicator="#step1-spinner">
      Testa connessione e carica servizi
    </button>
    <span id="step1-spinner" class="htmx-indicator">Caricamento...</span>
    <div id="step1-result"></div>
  </div>
</div>
{{end}}
