{{define "bando_form.html"}}
{{template "base" .}}
{{end}}

{{define "title"}}{{if .Bando}}Modifica bando{{else}}Nuovo bando{{end}}{{end}}

{{define "content"}}
<h1>{{if .Bando}}Modifica bando{{else}}Nuovo bando{{end}}</h1>
<form method="POST" action="{{if .Bando}}/bandi/{{.Bando.ID}}{{else}}/bandi{{end}}" class="form-narrow">
  <div class="form-group">
    <label>Service ID OpenCity</label>
    <input type="text" name="service_id" value="{{if .Bando}}{{.Bando.ServiceID}}{{end}}" required placeholder="UUID servizio">
  </div>
  <div class="form-group">
    <label>Nome bando</label>
    <input type="text" name="nome" value="{{if .Bando}}{{.Bando.Nome}}{{end}}" required>
  </div>
  <div class="form-group">
    <label>Budget totale (€)</label>
    <input type="number" name="budget_totale" step="0.01" value="{{if .Bando}}{{printf "%.2f" .Bando.BudgetTotale}}{{end}}" required>
  </div>
  <div class="form-group">
    <label>ISEE massimo (€)</label>
    <input type="number" name="isee_massimo" step="0.01" value="{{if .Bando}}{{printf "%.2f" .Bando.ISEEMassimo}}{{else}}40000{{end}}" required>
  </div>
  <div class="form-group">
    <label>Scadenza presentazione domande</label>
    <input type="date" name="scadenza_presentazione" value="{{if .Bando}}{{.Bando.ScadenzaPresentazione}}{{end}}">
  </div>
  <div class="form-group">
    <label>Engine</label>
    <select name="engine_type" id="engine_type" onchange="toggleEngineConfig()">
      <option value="mense_rette" {{if and .Bando (eq .Bando.EngineType "mense_rette")}}selected{{end}}>Rette e mense scolastiche (legacy)</option>
      <option value="generic" {{if and .Bando (eq .Bando.EngineType "generic")}}selected{{end}}>Generico (configurabile)</option>
    </select>
  </div>
  <div class="form-group" id="engine-config-group" style="{{if and .Bando (eq .Bando.EngineType "generic")}}{{else}}display:none{{end}}">
    <label>Engine Config (JSON)</label>
    <textarea name="engine_config" rows="20" style="font-family:monospace;width:100%">{{if .Bando}}{{.Bando.EngineConfig}}{{else}}{}{{end}}</textarea>
    <small class="text-muted">Mapping campo→path JSON, filtri, ordinamento, tipologie e rimborso.</small>
  </div>
  <script>
  function toggleEngineConfig() {
    var sel = document.getElementById('engine_type').value;
    document.getElementById('engine-config-group').style.display = sel === 'generic' ? '' : 'none';
  }
  </script>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Salva</button>
    <a href="/bandi" class="btn btn-secondary">Annulla</a>
  </div>
</form>
{{end}}
