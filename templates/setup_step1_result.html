{{define "setup_step1_result.html"}}
<div class="alert alert-success">Connessione a {{.BaseURL}} riuscita. Trovati {{len .Servizi}} servizi.</div>

<form hx-post="/setup/step/2" hx-target="#step2-result">
  <table class="table">
    <thead>
      <tr><th>Seleziona</th><th>Servizio</th><th>Nome bando</th><th>Budget €</th><th>ISEE max €</th><th>Scadenza</th><th>Engine</th></tr>
    </thead>
    <tbody>
    {{range .Servizi}}
    <tr>
      <td><input type="checkbox" name="service_id" value="{{.ID}}" onchange="toggleRiga(this)"></td>
      <td><small>{{.ID}}</small><br>{{.Nome}}</td>
      <td><input type="text" name="nome" value="{{.Nome}}" disabled style="width:200px"></td>
      <td><input type="number" name="budget_totale" step="0.01" placeholder="71096.37" disabled style="width:100px"></td>
      <td><input type="number" name="isee_massimo" step="0.01" value="40000" disabled style="width:100px"></td>
      <td><input type="date" name="scadenza" disabled></td>
      <td><select name="engine_type" disabled><option value="mense_rette">mense_rette</option></select></td>
    </tr>
    {{end}}
    </tbody>
  </table>
  <button type="submit" class="btn btn-primary">Salva bandi selezionati</button>
</form>
<div id="step2-result"></div>

<script>
function toggleRiga(cb) {
  const inputs = cb.closest('tr').querySelectorAll('input:not([type=checkbox]), select');
  inputs.forEach(el => el.disabled = !cb.checked);
}
</script>
{{end}}
