services:
  gestionale:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - gestionale_data:/data
    environment:
      PORT: "8080"
      DB_PATH: /data/gestionale.db
      OPENCITY_BASE_URL: https://service.comune.montesilvano.pe.it
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-apioperator}
    restart: unless-stopped

volumes:
  gestionale_data:
